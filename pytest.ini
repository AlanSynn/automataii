[tool:pytest]
testpaths = tests
norecursedirs = manual
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests that take more than 1 second
    core: Core module tests
    gui: GUI tests
    services: Service layer tests
