<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     width="24mm" height="34mm"
     viewBox="0 0 24 34"
     data-profile-key="motionsmith-ms4n"
     data-grid-pitch-mm="20"
     data-hole-diameter-mm="4">
  <title>Automataii fabrication spacer s16</title>
  <desc>S16 isolation spacer washer spacer with 4 mm center hole for axle/linkage/bracket clearance stacks.</desc>
  <defs>
    <style>
      .cut { fill: none; stroke: #ed1c24; stroke-width: 0.25; stroke-miterlimit: 10; }
      .drill { fill: none; stroke: #0071bc; stroke-width: 0.2; stroke-miterlimit: 10; }
      .score { fill: none; stroke: #777777; stroke-width: 0.15; stroke-dasharray: 2 1; }
      .label { fill: #333333; font-family: Arial, Helvetica, sans-serif; font-size: 4px; }
      .tiny { fill: #333333; font-family: Arial, Helvetica, sans-serif; font-size: 3px; }
      .paper { fill: #ffffff; stroke: none; }
    </style>
  </defs>
  <circle cx="12" cy="12" r="8" class="cut spacer-outline washer-outline" data-spacer-key="s16" data-outer-diameter-mm="16" data-inner-diameter-mm="4"/>
  <circle cx="12" cy="12" r="2" class="drill spacer-hole axle-hole linkage-hole bracket-hole" data-hole-role="spacer" data-hole-diameter-mm="4" data-hole-index="0"/>
  <text x="12" y="30" class="label" text-anchor="middle">S16 isolation spacer</text>
</svg>
