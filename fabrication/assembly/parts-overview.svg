  <text x="26" y="39" class="tiny" text-anchor="start">gears:g24</text>
  <rect x="99" y="30" width="80" height="11" class="score part-card" style="fill:#94a3b8;fill-opacity:0.2;stroke:#94a3b8;stroke-width:0.6" data-part-key="spacers:s10" data-part-index="2"/>
  <circle cx="106" cy="35.5" r="3.2" class="score part-token" data-part-key="spacers:s10" data-part-index="2"/>
