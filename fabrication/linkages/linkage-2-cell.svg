  <path d="M 14 7 L 54 7 A 7 7 0 0 1 54 21 L 14 21 A 7 7 0 0 1 14 7 Z" class="cut linkage-outline" data-cells="2" data-length-mm="40" data-pitch-mm="20" data-hole-count="3"/>
