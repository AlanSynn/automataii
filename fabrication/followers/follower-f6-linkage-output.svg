  <title>Automataii fabrication follower f6-linkage-output</title>
  <desc>6-cell linkage-output follower with 4 mm output/guide geometry. Guide slots slide on fixed pegboard pins or bracket hardware.</desc>
  <defs>
    <style>
      .cut { fill: none; stroke: #ed1c24; stroke-width: 0.25; stroke-miterlimit: 10; }
