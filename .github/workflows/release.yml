name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v0.1.0'
      publish_external:
        description: 'Publish GitHub Release and MotionSmith Pages OTA payload'
        required: true
        default: false
        type: boolean
      ota_smoke_passed:
        description: 'Manual attestation: matching staged/preflight old-to-new Sparkle OTA smoke test passed for this version/key/payload shape'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  MACOS_UNIVERSAL2_PYTHON_VERSION: '3.12.10'
  MOTIONSMITH_UPDATE_BASE_URL: 'https://alansynn.com/motionsmith/'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install pinned Sparkle 2.9.3
        id: sparkle
        run: |
          python3 scripts/install_sparkle.py --output-dir .sparkle --github-output "$GITHUB_OUTPUT"

      - name: Install universal2 Python
        run: |
          curl -L -o python-universal2.pkg "https://www.python.org/ftp/python/${MACOS_UNIVERSAL2_PYTHON_VERSION}/python-${MACOS_UNIVERSAL2_PYTHON_VERSION}-macos11.pkg"
          sudo installer -pkg python-universal2.pkg -target /
          /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12 - <<'PY'
          import subprocess
          import sys

          output = subprocess.check_output(["lipo", "-archs", sys.executable], text=True).strip()
          if {"arm64", "x86_64"} - set(output.split()):
              raise SystemExit(f"Python is not universal2-capable: {output}")
          print(f"universal2 Python: {sys.executable} ({output})")
          PY

      - name: Install dependencies
        run: |
          uv sync --python /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12

      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERT_P12:-}" || -z "${MACOS_CERT_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "::error::MACOS_CERT_P12, MACOS_CERT_PASSWORD, and KEYCHAIN_PASSWORD are required for a signed macOS release."
            exit 1
          fi
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build signed macOS DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MOTIONSMITH_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          MOTIONSMITH_OTA_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_external && '1' || '' }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY || secrets.SPARKLE_PUBLIC_KEY }}
          SPARKLE_FRAMEWORK_PATH: ${{ steps.sparkle.outputs.sparkle_framework }}
        run: |
          if [[ -z "${MACOS_SIGN_IDENTITY:-}" ]]; then
            echo "::error::MACOS_SIGN_IDENTITY is required for a signed macOS release."
            exit 1
          fi
          if [[ -z "${APPLE_NOTARY_PROFILE:-}" ]]; then
            if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
              export APPLE_NOTARY_PROFILE="MotionSmithNotary"
            else
              echo "::error::Set APPLE_NOTARY_PROFILE, or provide APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD so CI can create a temporary keychain profile."
              exit 1
            fi
          fi
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          fi
          uv run python scripts/build_macos.py --arch universal2 --sign "$MACOS_SIGN_IDENTITY" --notarize --verify-release --strict-distribution

      - name: Generate signed Sparkle appcast payload
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_external }}
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY || secrets.SPARKLE_PRIVATE_KEY }}
          OTA_SMOKE_PASSED: ${{ inputs.ota_smoke_passed }}
        run: |
          if [[ "$OTA_SMOKE_PASSED" != "true" ]]; then
            echo "::error::publish_external requires ota_smoke_passed=true as manual attestation for matching staged/preflight OTA evidence."
            exit 1
          fi
          if [[ -z "${SPARKLE_PRIVATE_ED_KEY:-}" ]]; then
            echo "::error::SPARKLE_PRIVATE_ED_KEY (or SPARKLE_PRIVATE_KEY) is required to sign the production Sparkle appcast."
            exit 1
          fi
          uv run python scripts/generate_appcast.py production \
            --artifact dist/MotionSmith-macos-universal2.dmg \
            --output-dir signed-appcast \
            --download-url-prefix "$MOTIONSMITH_UPDATE_BASE_URL" \
            --link "$MOTIONSMITH_UPDATE_BASE_URL" \
            --expected-artifact MotionSmith-macos-universal2.dmg \
            --expected-version "${{ inputs.version }}" \
            --sparkle-generate-appcast "${{ steps.sparkle.outputs.generate_appcast }}" \
            --private-key-env SPARKLE_PRIVATE_ED_KEY

      - name: Clean signing keychain
        if: ${{ always() }}
        run: |
          rm -f cert.p12
          security delete-keychain build.keychain || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/MotionSmith-macos-*.dmg

      - name: Upload signed Sparkle appcast payload
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_external }}
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-appcast-payload
          path: signed-appcast/**

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --group build

      - name: Build Linux AppImage
        run: |
          uv run python scripts/build_linux.py

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --group build

      - name: Prepare Windows signing certificate
        timeout-minutes: 5
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          WINDOWS_ALLOW_TEST_CERTIFICATE: ${{ github.event_name == 'workflow_dispatch' && !inputs.publish_external && '1' || '' }}
        run: |
          if ($env:WINDOWS_ALLOW_TEST_CERTIFICATE -eq "1") {
            Write-Warning "Using an ephemeral self-signed Windows test certificate. This artifact is runnable smoke evidence, not a trusted public release."
            $passwordText = [System.Guid]::NewGuid().ToString("N")
            openssl req -x509 -newkey rsa:2048 -keyout windows-test-key.pem -out windows-test-cert.pem -sha256 -days 7 -nodes -subj "/CN=MotionSmith CI Test Signing" -addext "keyUsage=digitalSignature" -addext "extendedKeyUsage=codeSigning"
            openssl x509 -in windows-test-cert.pem -outform der -out windows-test-cert.cer
            openssl pkcs12 -export -out windows-cert.pfx -inkey windows-test-key.pem -in windows-test-cert.pem -passout "pass:$passwordText"
            $rootCert = Import-Certificate -FilePath "windows-test-cert.cer" -CertStoreLocation Cert:\CurrentUser\Root
            Import-Certificate -FilePath "windows-test-cert.cer" -CertStoreLocation Cert:\CurrentUser\TrustedPublisher | Out-Null
            "WINDOWS_CERT_PASSWORD=$passwordText" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "WINDOWS_TEST_CERT_THUMBPRINT=$($rootCert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            $env:WINDOWS_CERT_PASSWORD = $passwordText
            Write-Host "Created ephemeral Windows test signing certificate: $($rootCert.Thumbprint)"
          } elseif ($env:WINDOWS_CERT_PFX -and $env:WINDOWS_CERT_PASSWORD) {
            [IO.File]::WriteAllBytes("windows-cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERT_PFX))
          } else {
            Write-Error "WINDOWS_CERT_PFX and WINDOWS_CERT_PASSWORD are required for signed Windows releases."
            exit 1
          }

      - name: Build signed Windows distribution
        timeout-minutes: 45
        env:
          WINDOWS_SIGNTOOL_PATH: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          PYTHONUNBUFFERED: "1"
        run: |
          uv run python -u scripts/build_windows.py --sign --certificate windows-cert.pfx --cert-password-env WINDOWS_CERT_PASSWORD --verify-signature

      - name: Smoke Windows executable
        env:
          CI: "true"
        run: |
          $extractDir = Join-Path $env:RUNNER_TEMP "motionsmith-windows"
          $scenarioDir = Join-Path $env:RUNNER_TEMP "motionsmith-scenario"
          Remove-Item -Recurse -Force $extractDir, $scenarioDir -ErrorAction SilentlyContinue
          Expand-Archive -Path "dist/MotionSmith-windows.zip" -DestinationPath $extractDir -Force
          $exe = Join-Path $extractDir "MotionSmith\MotionSmith.exe"
          if (-not (Test-Path $exe)) { Write-Error "Missing extracted Windows executable: $exe"; exit 1 }
          $process = Start-Process -FilePath $exe -ArgumentList @("--scenario", "blueprint-export", "--scenario-output", $scenarioDir) -PassThru
          if (-not $process.WaitForExit(120000)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            Write-Error "Windows executable smoke timed out."
            exit 1
          }
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
          $manifest = Join-Path $scenarioDir "foundry_blueprint_manifest.json"
          if (-not (Test-Path $manifest)) { Write-Error "Windows executable smoke manifest missing: $manifest"; exit 1 }
          Write-Host "Windows executable smoke passed with manifest: $manifest"

      - name: Clean Windows signing certificate
        if: ${{ always() }}
        run: |
          Remove-Item -Force windows-cert.pfx -ErrorAction SilentlyContinue
          Remove-Item -Force windows-test-cert.cer -ErrorAction SilentlyContinue
          Remove-Item -Force windows-test-cert.pem -ErrorAction SilentlyContinue
          Remove-Item -Force windows-test-key.pem -ErrorAction SilentlyContinue
          if ($env:WINDOWS_TEST_CERT_THUMBPRINT) {
            Remove-Item -Force "Cert:\CurrentUser\My\$env:WINDOWS_TEST_CERT_THUMBPRINT" -ErrorAction SilentlyContinue
            Remove-Item -Force "Cert:\CurrentUser\Root\$env:WINDOWS_TEST_CERT_THUMBPRINT" -ErrorAction SilentlyContinue
            Remove-Item -Force "Cert:\CurrentUser\TrustedPublisher\$env:WINDOWS_TEST_CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/MotionSmith-windows.zip

  create-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_external }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Validate generated production appcast payload
        env:
          OTA_SMOKE_PASSED: ${{ inputs.ota_smoke_passed }}
        run: |
          if [[ "$OTA_SMOKE_PASSED" != "true" ]]; then
            echo "::error::publish_external requires ota_smoke_passed=true as manual attestation for matching staged/preflight OTA evidence."
            exit 1
          fi
          python3 scripts/validate_appcast.py sparkle-appcast-payload/appcast.xml \
            --expected-artifact MotionSmith-macos-universal2.dmg \
            --expected-version "${{ inputs.version }}" \
            --expected-url-prefix "$MOTIONSMITH_UPDATE_BASE_URL" \
            --payload-dir sparkle-appcast-payload

      - name: Preflight MotionSmith Pages publishing access
        env:
          MOTIONSMITH_PAGES_TOKEN: ${{ secrets.MOTIONSMITH_PAGES_TOKEN }}
          MOTIONSMITH_PAGES_DEPLOY_KEY: ${{ secrets.MOTIONSMITH_PAGES_DEPLOY_KEY }}
          MOTIONSMITH_PAGES_DEPLOY_KEY_FINGERPRINT: ${{ vars.MOTIONSMITH_PAGES_DEPLOY_KEY_FINGERPRINT || secrets.MOTIONSMITH_PAGES_DEPLOY_KEY_FINGERPRINT }}
        run: |
          python3 scripts/publish_ota_pages.py preflight

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: |
            macos-dmg/*
            linux-appimage/*
            windows-release/*
            sparkle-appcast-payload/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish OTA payload to MotionSmith Pages repository
        env:
          MOTIONSMITH_PAGES_TOKEN: ${{ secrets.MOTIONSMITH_PAGES_TOKEN }}
          MOTIONSMITH_PAGES_DEPLOY_KEY: ${{ secrets.MOTIONSMITH_PAGES_DEPLOY_KEY }}
          MOTIONSMITH_PAGES_DEPLOY_KEY_FINGERPRINT: ${{ vars.MOTIONSMITH_PAGES_DEPLOY_KEY_FINGERPRINT || secrets.MOTIONSMITH_PAGES_DEPLOY_KEY_FINGERPRINT }}
        run: |
          python3 scripts/publish_ota_pages.py publish \
            --payload-dir sparkle-appcast-payload \
            --version "${{ inputs.version }}" \
            --expected-artifact MotionSmith-macos-universal2.dmg \
            --expected-url-prefix "$MOTIONSMITH_UPDATE_BASE_URL" \
            --appcast-url "${MOTIONSMITH_UPDATE_BASE_URL%/}/appcast.xml" \
            --retries 18 \
            --delay 10 \
            --timeout 20
