name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v0.1.0'
      publish_external:
        description: 'Publish GitHub Release and Pages appcast'
        required: true
        default: false
        type: boolean
      signed_appcast_url:
        description: 'HTTPS URL to a production Sparkle EdDSA-signed appcast.xml'
        required: false
        default: ''
      ota_smoke_passed:
        description: 'Confirm an old-to-new Sparkle OTA smoke test passed for this appcast'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

env:
  MACOS_UNIVERSAL2_PYTHON_VERSION: '3.12.10'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install universal2 Python
        run: |
          curl -L -o python-universal2.pkg "https://www.python.org/ftp/python/${MACOS_UNIVERSAL2_PYTHON_VERSION}/python-${MACOS_UNIVERSAL2_PYTHON_VERSION}-macos11.pkg"
          sudo installer -pkg python-universal2.pkg -target /
          /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12 - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          output = subprocess.check_output(["lipo", "-archs", sys.executable], text=True).strip()
          if {"arm64", "x86_64"} - set(output.split()):
              raise SystemExit(f"Python is not universal2-capable: {output}")
          print(f"universal2 Python: {sys.executable} ({output})")
          PY
          
      - name: Install dependencies
        run: |
          uv sync --python /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12
          
      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERT_P12:-}" || -z "${MACOS_CERT_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "::error::MACOS_CERT_P12, MACOS_CERT_PASSWORD, and KEYCHAIN_PASSWORD are required for a signed macOS release."
            exit 1
          fi
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Fetch and validate signed OTA appcast for publication build
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_external }}
        env:
          SIGNED_APPCAST_URL: ${{ inputs.signed_appcast_url }}
          OTA_SMOKE_PASSED: ${{ inputs.ota_smoke_passed }}
        run: |
          if [[ "$OTA_SMOKE_PASSED" != "true" ]]; then
            echo "::error::publish_external requires ota_smoke_passed=true after an old-to-new Sparkle OTA smoke test."
            exit 1
          fi
          if [[ -z "$SIGNED_APPCAST_URL" ]]; then
            echo "::error::publish_external requires signed_appcast_url pointing to a Sparkle EdDSA-signed appcast.xml."
            exit 1
          fi
          if [[ "$SIGNED_APPCAST_URL" != https://* ]]; then
            echo "::error::signed_appcast_url must use HTTPS."
            exit 1
          fi
          mkdir -p signed-appcast
          curl --proto '=https' --proto-redir '=https' -fsSL "$SIGNED_APPCAST_URL" -o signed-appcast/appcast.xml
          uv run python scripts/validate_appcast.py signed-appcast/appcast.xml \
            --expected-artifact MotionSmith-macos-universal2.dmg \
            --expected-version "${{ inputs.version }}"

      - name: Build signed macOS DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MOTIONSMITH_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          MOTIONSMITH_OTA_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_external && '1' || '' }}
          MOTIONSMITH_SIGNED_APPCAST_PATH: signed-appcast/appcast.xml
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY || secrets.SPARKLE_PUBLIC_KEY }}
          SPARKLE_FRAMEWORK_PATH: ${{ vars.SPARKLE_FRAMEWORK_PATH }}
        run: |
          if [[ -z "${MACOS_SIGN_IDENTITY:-}" ]]; then
            echo "::error::MACOS_SIGN_IDENTITY is required for a signed macOS release."
            exit 1
          fi
          if [[ -z "${APPLE_NOTARY_PROFILE:-}" ]]; then
            if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
              export APPLE_NOTARY_PROFILE="MotionSmithNotary"
            else
              echo "::error::Set APPLE_NOTARY_PROFILE, or provide APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD so CI can create a temporary keychain profile."
              exit 1
            fi
          fi
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          fi
          uv run python scripts/build_macos.py --arch universal2 --sign "$MACOS_SIGN_IDENTITY" --notarize --verify-release --strict-distribution

      - name: Clean signing keychain
        if: ${{ always() }}
        run: |
          rm -f cert.p12
          security delete-keychain build.keychain || true
          
      - name: Note production appcast signing gate
        run: |
          echo "This workflow only builds diagnostic appcast artifacts by default."
          echo "Production OTA publication requires a pre-signed Sparkle EdDSA appcast and explicit publish_external=true."
          
      - name: Generate Appcast
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create appcast directory
          mkdir -p appcast
          
          # Generate diagnostic appcast metadata from the MotionSmith releases API.
          # Do not publish this as production OTA evidence unless Sparkle EdDSA signing
          # is supplied by the official Sparkle tooling.
          uv run --with requests python scripts/generate_appcast.py AlanSynn/motionsmith appcast/appcast.xml
          
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/MotionSmith-macos-*.dmg
          
      - name: Upload diagnostic Appcast artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-appcast
          path: appcast/appcast.xml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2
          
      - name: Install uv
        uses: astral-sh/setup-uv@v4
          
      - name: Install dependencies
        run: |
          uv sync
          
      - name: Build Linux AppImage
        run: |
          uv run python scripts/build_linux.py
          
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install uv
        uses: astral-sh/setup-uv@v4
          
      - name: Install dependencies
        run: |
          uv sync
          
      - name: Build Windows executable
        run: |
          uv run python scripts/build_windows.py
          
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  create-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_external }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Fetch and validate signed production appcast
        env:
          SIGNED_APPCAST_URL: ${{ inputs.signed_appcast_url }}
          OTA_SMOKE_PASSED: ${{ inputs.ota_smoke_passed }}
        run: |
          if [[ "$OTA_SMOKE_PASSED" != "true" ]]; then
            echo "::error::publish_external requires ota_smoke_passed=true after an old-to-new Sparkle OTA smoke test."
            exit 1
          fi
          if [[ -z "$SIGNED_APPCAST_URL" ]]; then
            echo "::error::publish_external requires signed_appcast_url pointing to a Sparkle EdDSA-signed appcast.xml."
            exit 1
          fi
          if [[ "$SIGNED_APPCAST_URL" != https://* ]]; then
            echo "::error::signed_appcast_url must use HTTPS."
            exit 1
          fi
          mkdir -p signed-appcast
          curl --proto '=https' --proto-redir '=https' -fsSL "$SIGNED_APPCAST_URL" -o signed-appcast/appcast.xml
          python3 scripts/validate_appcast.py signed-appcast/appcast.xml \
            --expected-artifact MotionSmith-macos-universal2.dmg \
            --expected-version "${{ inputs.version }}"
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: |
            macos-dmg/*
            linux-appimage/*
            windows-exe/*
            signed-appcast/appcast.xml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: signed-appcast
          
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
        id: deployment
