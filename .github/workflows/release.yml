name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  MACOS_UNIVERSAL2_PYTHON_VERSION: '3.12.10'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install universal2 Python
        run: |
          curl -L -o python-universal2.pkg "https://www.python.org/ftp/python/${MACOS_UNIVERSAL2_PYTHON_VERSION}/python-${MACOS_UNIVERSAL2_PYTHON_VERSION}-macos11.pkg"
          sudo installer -pkg python-universal2.pkg -target /
          /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12 - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          output = subprocess.check_output(["lipo", "-archs", sys.executable], text=True).strip()
          if {"arm64", "x86_64"} - set(output.split()):
              raise SystemExit(f"Python is not universal2-capable: {output}")
          print(f"universal2 Python: {sys.executable} ({output})")
          PY
          
      - name: Install dependencies
        run: |
          uv sync --python /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12
          
      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERT_P12:-}" || -z "${MACOS_CERT_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "::error::MACOS_CERT_P12, MACOS_CERT_PASSWORD, and KEYCHAIN_PASSWORD are required for a signed macOS release."
            exit 1
          fi
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build signed macOS DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "${MACOS_SIGN_IDENTITY:-}" ]]; then
            echo "::error::MACOS_SIGN_IDENTITY is required for a signed macOS release."
            exit 1
          fi
          if [[ -z "${APPLE_NOTARY_PROFILE:-}" ]]; then
            if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
              export APPLE_NOTARY_PROFILE="AutomataiiNotary"
            else
              echo "::error::Set APPLE_NOTARY_PROFILE, or provide APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD so CI can create a temporary keychain profile."
              exit 1
            fi
          fi
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          fi
          uv run python scripts/build_macos.py --arch universal2 --sign "$MACOS_SIGN_IDENTITY" --notarize --verify-release --strict-distribution

      - name: Clean signing keychain
        if: ${{ always() }}
        run: |
          rm -f cert.p12
          security delete-keychain build.keychain || true
          
      - name: Generate EdDSA key for Sparkle (if not exists)
        run: |
          if [ ! -f sparkle_private_key ]; then
            # Download generate_keys tool from Sparkle
            curl -L -o sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/2.5.2/Sparkle-2.5.2.tar.xz"
            tar -xf sparkle.tar.xz
            ./bin/generate_keys
            echo "SPARKLE_PRIVATE_KEY=$(cat sparkle_private_key)" >> $GITHUB_ENV
            echo "SPARKLE_PUBLIC_KEY=$(cat sparkle_public_key)" >> $GITHUB_ENV
          fi
          
      - name: Generate Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create appcast directory
          mkdir -p appcast
          
          # Generate appcast from GitHub releases using API
          uv run --with requests python scripts/generate_appcast.py automataii/automataii appcast/appcast.xml
          
          # Sparkle 서명 추가 (선택적)
          if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            echo "$SPARKLE_PRIVATE_KEY" > sparkle_private_key
            if [ -f ./bin/generate_appcast ]; then
              ./bin/generate_appcast appcast/
            fi
          fi
          
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Automataii-macos-*.dmg
          
      - name: Upload Appcast artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast
          path: appcast/appcast.xml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2
          
      - name: Install uv
        uses: astral-sh/setup-uv@v4
          
      - name: Install dependencies
        run: |
          uv sync
          
      - name: Build Linux AppImage
        run: |
          uv run python scripts/build_linux.py
          
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install uv
        uses: astral-sh/setup-uv@v4
          
      - name: Install dependencies
        run: |
          uv sync
          
      - name: Build Windows executable
        run: |
          uv run python scripts/build_windows.py
          
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  create-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-dmg/*
            linux-appimage/*
            windows-exe/*
            appcast/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: appcast
          
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
        id: deployment
