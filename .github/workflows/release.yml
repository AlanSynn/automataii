name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
      publish_external:
        description: 'Publish GitHub Release'
        required: true
        default: false
        type: boolean
      ota_smoke_passed:
        description: 'manual attestation flag; release.yml rejects built-in OTA for split macOS DMGs, use publish-ota.yml after selecting one verified DMG'
        required: true
        default: false
        type: boolean
      allow_test_windows_certificate:
        description: 'TEMPORARY: allow a self-signed/test Windows certificate and add a release warning'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  MACOS_UNIVERSAL2_PYTHON_VERSION: '3.12.10'
  MOTIONSMITH_UPDATE_BASE_URL: 'https://alansynn.com/motionsmith/'

jobs:
  validate-release-ref:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$INPUT_VERSION"
          fi
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version must be vX.Y.Z: $version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Reject built-in OTA publish for split macOS DMGs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_external && inputs.ota_smoke_passed }}
        run: |
          echo "::error::release.yml produces notarized arm64 and x86_64 DMGs. Sparkle OTA publication needs one selected, smoke-tested DMG; use publish-ota.yml for OTA after the release asset exists."
          exit 1

  build-macos:
    needs: validate-release-ref
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_external }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install pinned Sparkle 2.9.3
        id: sparkle
        run: |
          python3 scripts/install_sparkle.py --output-dir .sparkle --github-output "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          uv sync --group build-macos

      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERT_P12:-}" || -z "${MACOS_CERT_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "::error::MACOS_CERT_P12, MACOS_CERT_PASSWORD, and KEYCHAIN_PASSWORD are required for a signed macOS release."
            exit 1
          fi
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build signed macOS DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MOTIONSMITH_VERSION: ${{ needs.validate-release-ref.outputs.version }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY || secrets.SPARKLE_PUBLIC_KEY }}
          SPARKLE_FRAMEWORK_PATH: ${{ steps.sparkle.outputs.sparkle_framework }}
        run: |
          if [[ -z "${MACOS_SIGN_IDENTITY:-}" ]]; then
            echo "::error::MACOS_SIGN_IDENTITY is required for a signed macOS release."
            exit 1
          fi
          if [[ -z "${APPLE_ID:-}" || -z "${APPLE_TEAM_ID:-}" || -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            echo "::error::GitHub release notarization requires APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD so this runner can create a temporary notarytool profile."
            exit 1
          fi
          if [[ -z "${APPLE_NOTARY_PROFILE:-}" ]]; then
            export APPLE_NOTARY_PROFILE="MotionSmithNotary"
          fi
          xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          uv run python scripts/build_macos.py --arch "${{ matrix.arch }}" --sign "$MACOS_SIGN_IDENTITY" --notarize --verify-release --strict-distribution

      - name: Clean signing keychain
        if: ${{ always() }}
        run: |
          rm -f cert.p12
          security delete-keychain build.keychain || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: dist/MotionSmith-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error

  build-linux:
    needs: validate-release-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --group build

      - name: Build Linux AppImage
        run: |
          uv run python scripts/build_linux.py

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  build-windows:
    needs: validate-release-ref
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --group build

      - name: Avoid stale Python toolcache VC runtime shadowing ONNXRuntime
        shell: pwsh
        run: |
          $names = @(
            "concrt140.dll",
            "msvcp140.dll",
            "msvcp140_1.dll",
            "msvcp140_2.dll",
            "vccorlib140.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll"
          )
          $pythonRoot = $env:pythonLocation
          if (-not $pythonRoot -or -not (Test-Path $pythonRoot)) {
            Write-Error "pythonLocation is unavailable; cannot sanitize Windows VC runtime shadow DLLs."
            exit 1
          }
          $removed = @()
          Get-ChildItem -Path $pythonRoot -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object {
            if ($names -contains $_.Name.ToLowerInvariant()) {
              $removed += $_.FullName
              Remove-Item -LiteralPath $_.FullName -Force
            }
          }
          if ($removed.Count -gt 0) {
            Write-Host "Removed stale Python toolcache VC runtime DLLs that shadow ONNXRuntime:"
            $removed | ForEach-Object { Write-Host "  $_" }
          } else {
            Write-Host "No Python toolcache VC runtime shadow DLLs found."
          }
          uv run python -c "import onnxruntime as ort; print('ONNXRuntime import ok', ort.__version__, ort.get_available_providers())"

      - name: Prepare Windows signing certificate
        timeout-minutes: 5
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          WINDOWS_ALLOW_TEST_CERTIFICATE: ${{ github.event_name == 'workflow_dispatch' && (!inputs.publish_external || inputs.allow_test_windows_certificate) && '1' || '' }}
        run: |
          if ($env:WINDOWS_CERT_PFX -and $env:WINDOWS_CERT_PASSWORD) {
            [IO.File]::WriteAllBytes("windows-cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERT_PFX))
            "WINDOWS_CERT_PASSWORD=$env:WINDOWS_CERT_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            if ($env:WINDOWS_ALLOW_TEST_CERTIFICATE -eq "1") {
              "WINDOWS_TEST_CERTIFICATE_MODE=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              Write-Warning "Loaded GitHub-secret Windows signing certificate payload in test-certificate mode. This is temporary and not a trusted public Windows signature."
            } else {
              $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new("windows-cert.pfx", $env:WINDOWS_CERT_PASSWORD)
              if ($cert.Subject -eq $cert.Issuer -or $cert.Subject -match "Test Signing|CI Test|Self-Signed") {
                Write-Error "WINDOWS_CERT_PFX is a self-signed/test certificate. Production releases require a CA-issued trusted code-signing certificate."
                exit 1
              }
              Write-Host "Loaded GitHub-secret Windows signing certificate payload for production verification."
            }
          } elseif ($env:WINDOWS_ALLOW_TEST_CERTIFICATE -eq "1") {
            Write-Warning "Using a public test-only Windows signing certificate. This artifact is runnable smoke evidence, not a trusted public release."
            # Public, test-only PFX. It signs this disposable smoke artifact only.
            $passwordText = "motionsmith-ci-test"
            $testPfxBase64 = ""
            $testCerBase64 = ""
            [IO.File]::WriteAllBytes("windows-cert.pfx", [Convert]::FromBase64String($testPfxBase64))
            [IO.File]::WriteAllBytes("windows-test-cert.cer", [Convert]::FromBase64String($testCerBase64))
            "WINDOWS_CERT_PASSWORD=$passwordText" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "WINDOWS_TEST_CERTIFICATE_MODE=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            $env:WINDOWS_CERT_PASSWORD = $passwordText
            Write-Host "Loaded public Windows test signing certificate payload."
          } else {
            Write-Error "WINDOWS_CERT_PFX and WINDOWS_CERT_PASSWORD are required for signed Windows releases."
            exit 1
          }

      - name: Build signed Windows distribution
        timeout-minutes: 45
        env:
          WINDOWS_SIGNTOOL_PATH: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          PYTHONUNBUFFERED: "1"
        run: |
          $buildArgs = @("--sign", "--certificate", "windows-cert.pfx", "--cert-password-env", "WINDOWS_CERT_PASSWORD")
          if ($env:WINDOWS_TEST_CERTIFICATE_MODE -eq "1") {
            Write-Warning "Skipping trust-chain signature verification for the non-production test certificate; checking Authenticode signature presence instead."
          } else {
            $buildArgs += "--verify-signature"
          }
          uv run python -u scripts/build_windows.py @buildArgs
          if ($env:WINDOWS_TEST_CERTIFICATE_MODE -eq "1") {
            $signature = Get-AuthenticodeSignature "dist/MotionSmith/MotionSmith.exe"
            $signature | Format-List
            if (-not $signature.SignerCertificate) {
              Write-Error "MotionSmith.exe is not Authenticode-signed."
              exit 1
            }
          }

      - name: Smoke Windows executable
        env:
          CI: "true"
        run: |
          $extractDir = Join-Path $env:RUNNER_TEMP "motionsmith-windows"
          $scenarioDir = Join-Path $env:RUNNER_TEMP "motionsmith-scenario"
          $imageScenarioDir = Join-Path $env:RUNNER_TEMP "motionsmith-image-scenario"
          Remove-Item -Recurse -Force $extractDir, $scenarioDir, $imageScenarioDir -ErrorAction SilentlyContinue
          Expand-Archive -Path "dist/MotionSmith-windows.zip" -DestinationPath $extractDir -Force
          $exe = Join-Path $extractDir "MotionSmith.exe"
          if (-not (Test-Path $exe)) { Write-Error "Missing extracted Windows executable: $exe"; exit 1 }

          function Show-MotionSmithScenarioDiagnostics($Name, $OutputDir, $Stdout, $Stderr) {
            Write-Host "::group::MotionSmith scenario diagnostics: $Name"
            if (Test-Path $Stdout) {
              Write-Host "--- stdout ---"
              Get-Content $Stdout -ErrorAction SilentlyContinue
            }
            if (Test-Path $Stderr) {
              Write-Host "--- stderr ---"
              Get-Content $Stderr -ErrorAction SilentlyContinue
            }
            if (Test-Path $OutputDir) {
              Write-Host "--- output files ---"
              Get-ChildItem -Path $OutputDir -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            }
            Write-Host "::endgroup::"
          }

          function Invoke-MotionSmithScenario($Name, $OutputDir, $TimeoutMs) {
            New-Item -ItemType Directory -Force -Path $OutputDir | Out-Null
            $stdout = Join-Path $OutputDir "scenario-$Name.stdout.log"
            $stderr = Join-Path $OutputDir "scenario-$Name.stderr.log"
            $process = Start-Process -FilePath $exe -ArgumentList @("--scenario", $Name, "--scenario-output", $OutputDir) -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
            if (-not $process.WaitForExit($TimeoutMs)) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              Show-MotionSmithScenarioDiagnostics $Name $OutputDir $stdout $stderr
              Write-Error "Windows executable scenario '$Name' timed out."
              exit 1
            }
            if ($process.ExitCode -ne 0) {
              Show-MotionSmithScenarioDiagnostics $Name $OutputDir $stdout $stderr
              exit $process.ExitCode
            }
            Show-MotionSmithScenarioDiagnostics $Name $OutputDir $stdout $stderr
          }

          Invoke-MotionSmithScenario "blueprint-export" $scenarioDir 120000
          $manifest = Join-Path $scenarioDir "foundry_blueprint_manifest.json"
          if (-not (Test-Path $manifest)) { Write-Error "Windows executable blueprint smoke manifest missing: $manifest"; exit 1 }

          Invoke-MotionSmithScenario "image-processing" $imageScenarioDir 180000
          $imageManifest = Join-Path $imageScenarioDir "image_processing_manifest.json"
          $charConfig = Join-Path $imageScenarioDir "annotations\char_cfg.yaml"
          $partsInfo = Join-Path $imageScenarioDir "parts\parts_info.json"
          $viewerHtml = Join-Path $imageScenarioDir "parts\viewer.html"
          foreach ($required in @($imageManifest, $charConfig, $partsInfo, $viewerHtml)) {
            if (-not (Test-Path $required)) {
              Write-Error "Windows executable image-processing artifact missing: $required"
              exit 1
            }
          }
          $viewerText = [System.IO.File]::ReadAllText($viewerHtml, [System.Text.Encoding]::UTF8)
          if (-not $viewerText.Contains('<html lang="en">') -or -not $viewerText.Contains('Character Body Part Segmentation Results')) {
            Write-Error "Windows executable image-processing viewer is not the expected English UTF-8 HTML: $viewerHtml"
            exit 1
          }
          foreach ($char in $viewerText.ToCharArray()) {
            $codepoint = [int][char]$char
            if ($codepoint -ge 0xAC00 -and $codepoint -le 0xD7A3) {
              Write-Error "Windows executable image-processing viewer contains Hangul text: $viewerHtml"
              exit 1
            }
          }
          Write-Host "Windows executable smoke passed with manifests: $manifest and $imageManifest"

      - name: Clean Windows signing certificate
        if: ${{ always() }}
        run: |
          Remove-Item -Force windows-cert.pfx -ErrorAction SilentlyContinue
          Remove-Item -Force windows-test-cert.cer -ErrorAction SilentlyContinue
          Remove-Item -Force windows-test-cert.pem -ErrorAction SilentlyContinue
          Remove-Item -Force windows-test-key.pem -ErrorAction SilentlyContinue

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/MotionSmith-windows.zip

  smoke-windows-portable:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - name: Download Windows release artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: windows-release

      - name: Smoke downloaded Windows executable
        env:
          CI: "true"
        run: |
          $zip = Join-Path "windows-release" "MotionSmith-windows.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "motionsmith-portable"
          $scenarioDir = Join-Path $env:RUNNER_TEMP "motionsmith-portable-scenario"
          $imageScenarioDir = Join-Path $env:RUNNER_TEMP "motionsmith-portable-image-scenario"
          Remove-Item -Recurse -Force $extractDir, $scenarioDir, $imageScenarioDir -ErrorAction SilentlyContinue

          Expand-Archive -Path $zip -DestinationPath $extractDir -Force
          $exe = Join-Path $extractDir "MotionSmith.exe"
          if (-not (Test-Path $exe)) { Write-Error "Missing downloaded Windows executable: $exe"; exit 1 }

          function Show-MotionSmithScenarioDiagnostics($Name, $OutputDir, $Stdout, $Stderr) {
            Write-Host "::group::MotionSmith scenario diagnostics: $Name"
            if (Test-Path $Stdout) {
              Write-Host "--- stdout ---"
              Get-Content $Stdout -ErrorAction SilentlyContinue
            }
            if (Test-Path $Stderr) {
              Write-Host "--- stderr ---"
              Get-Content $Stderr -ErrorAction SilentlyContinue
            }
            if (Test-Path $OutputDir) {
              Write-Host "--- output files ---"
              Get-ChildItem -Path $OutputDir -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            }
            Write-Host "::endgroup::"
          }

          function Invoke-MotionSmithScenario($Name, $OutputDir, $TimeoutMs) {
            New-Item -ItemType Directory -Force -Path $OutputDir | Out-Null
            $stdout = Join-Path $OutputDir "scenario-$Name.stdout.log"
            $stderr = Join-Path $OutputDir "scenario-$Name.stderr.log"
            $process = Start-Process -FilePath $exe -ArgumentList @("--scenario", $Name, "--scenario-output", $OutputDir) -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
            if (-not $process.WaitForExit($TimeoutMs)) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              Show-MotionSmithScenarioDiagnostics $Name $OutputDir $stdout $stderr
              Write-Error "Downloaded Windows executable scenario '$Name' timed out."
              exit 1
            }
            if ($process.ExitCode -ne 0) {
              Show-MotionSmithScenarioDiagnostics $Name $OutputDir $stdout $stderr
              exit $process.ExitCode
            }
            Show-MotionSmithScenarioDiagnostics $Name $OutputDir $stdout $stderr
          }

          Invoke-MotionSmithScenario "blueprint-export" $scenarioDir 120000
          $manifest = Join-Path $scenarioDir "foundry_blueprint_manifest.json"
          if (-not (Test-Path $manifest)) { Write-Error "Downloaded Windows smoke manifest missing: $manifest"; exit 1 }

          Invoke-MotionSmithScenario "image-processing" $imageScenarioDir 180000
          $imageManifest = Join-Path $imageScenarioDir "image_processing_manifest.json"
          $charConfig = Join-Path $imageScenarioDir "annotations\char_cfg.yaml"
          $partsInfo = Join-Path $imageScenarioDir "parts\parts_info.json"
          $viewerHtml = Join-Path $imageScenarioDir "parts\viewer.html"
          foreach ($required in @($imageManifest, $charConfig, $partsInfo, $viewerHtml)) {
            if (-not (Test-Path $required)) {
              Write-Error "Downloaded Windows image-processing artifact missing: $required"
              exit 1
            }
          }
          $viewerText = [System.IO.File]::ReadAllText($viewerHtml, [System.Text.Encoding]::UTF8)
          if (-not $viewerText.Contains('<html lang="en">') -or -not $viewerText.Contains('Character Body Part Segmentation Results')) {
            Write-Error "Downloaded Windows image-processing viewer is not the expected English UTF-8 HTML: $viewerHtml"
            exit 1
          }
          foreach ($char in $viewerText.ToCharArray()) {
            $codepoint = [int][char]$char
            if ($codepoint -ge 0xAC00 -and $codepoint -le 0xD7A3) {
              Write-Error "Downloaded Windows image-processing viewer contains Hangul text: $viewerHtml"
              exit 1
            }
          }
          Write-Host "Windows portable exe smoke passed with manifests: $manifest and $imageManifest"

  create-release:
    needs: [validate-release-ref, build-macos, build-linux, build-windows, smoke-windows-portable]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_external) }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.ota_smoke_passed && !inputs.allow_test_windows_certificate) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release-ref.outputs.version }}
          files: |
            macos-dmg-*/*
            linux-appimage/*
            windows-release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Test-Signed Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_external && !inputs.ota_smoke_passed && inputs.allow_test_windows_certificate }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release-ref.outputs.version }}
          files: |
            macos-dmg-*/*
            linux-appimage/*
            windows-release/*
          body: |
            ⚠️ Windows signing trust note:
            This is a stable MotionSmith release. This workflow run was allowed to use a self-signed/test Windows certificate because `allow_test_windows_certificate=true`.
            macOS artifacts are still Developer ID signed and notarized. Replace `WINDOWS_CERT_PFX` with a CA-issued Windows code-signing certificate before expecting Windows SmartScreen/trust-chain behavior equivalent to a commercial public Windows distribution.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
