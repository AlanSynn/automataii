name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'
      create_release:
        description: 'Create GitHub release and publish MotionSmith Pages OTA payload'
        required: true
        default: false
        type: boolean
      ota_smoke_passed:
        description: 'Manual attestation: matching staged/preflight old-to-new Sparkle OTA smoke test passed for this version/key/payload shape'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  MACOS_UNIVERSAL2_PYTHON_VERSION: '3.12.10'
  MOTIONSMITH_UPDATE_BASE_URL: 'https://alansynn.github.io/motionsmith/'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install pinned Sparkle 2.9.3
        id: sparkle
        run: |
          python3 scripts/install_sparkle.py --output-dir .sparkle --github-output "$GITHUB_OUTPUT"

      - name: Install universal2 Python
        run: |
          curl -L -o python-universal2.pkg "https://www.python.org/ftp/python/${MACOS_UNIVERSAL2_PYTHON_VERSION}/python-${MACOS_UNIVERSAL2_PYTHON_VERSION}-macos11.pkg"
          sudo installer -pkg python-universal2.pkg -target /
          /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12 - <<'PY'
          import subprocess
          import sys

          output = subprocess.check_output(["lipo", "-archs", sys.executable], text=True).strip()
          if {"arm64", "x86_64"} - set(output.split()):
              raise SystemExit(f"Python is not universal2-capable: {output}")
          print(f"universal2 Python: {sys.executable} ({output})")
          PY

      - name: Install dependencies
        run: |
          uv sync --python /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12

      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERT_P12:-}" || -z "${MACOS_CERT_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "::error::MACOS_CERT_P12, MACOS_CERT_PASSWORD, and KEYCHAIN_PASSWORD are required for a signed macOS release."
            exit 1
          fi
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build signed macOS DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MOTIONSMITH_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          MOTIONSMITH_OTA_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release && '1' || '' }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY || secrets.SPARKLE_PUBLIC_KEY }}
          SPARKLE_FRAMEWORK_PATH: ${{ steps.sparkle.outputs.sparkle_framework }}
        run: |
          if [[ -z "${MACOS_SIGN_IDENTITY:-}" ]]; then
            echo "::error::MACOS_SIGN_IDENTITY is required for a signed macOS release."
            exit 1
          fi
          if [[ -z "${APPLE_NOTARY_PROFILE:-}" ]]; then
            if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
              export APPLE_NOTARY_PROFILE="MotionSmithNotary"
            else
              echo "::error::Set APPLE_NOTARY_PROFILE, or provide APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD so CI can create a temporary keychain profile."
              exit 1
            fi
          fi
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          fi
          uv run python scripts/build_macos.py --arch universal2 --sign "$MACOS_SIGN_IDENTITY" --notarize --verify-release --strict-distribution

      - name: Generate signed Sparkle appcast payload
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release }}
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY || secrets.SPARKLE_PRIVATE_KEY }}
          OTA_SMOKE_PASSED: ${{ inputs.ota_smoke_passed }}
        run: |
          if [[ "$OTA_SMOKE_PASSED" != "true" ]]; then
            echo "::error::create_release requires ota_smoke_passed=true as manual attestation for matching staged/preflight OTA evidence."
            exit 1
          fi
          if [[ -z "${SPARKLE_PRIVATE_ED_KEY:-}" ]]; then
            echo "::error::SPARKLE_PRIVATE_ED_KEY (or SPARKLE_PRIVATE_KEY) is required to sign the production Sparkle appcast."
            exit 1
          fi
          uv run python scripts/generate_appcast.py production \
            --artifact dist/MotionSmith-macos-universal2.dmg \
            --output-dir signed-appcast \
            --download-url-prefix "$MOTIONSMITH_UPDATE_BASE_URL" \
            --link "$MOTIONSMITH_UPDATE_BASE_URL" \
            --expected-artifact MotionSmith-macos-universal2.dmg \
            --expected-version "${{ inputs.version }}" \
            --sparkle-generate-appcast "${{ steps.sparkle.outputs.generate_appcast }}" \
            --private-key-env SPARKLE_PRIVATE_ED_KEY

      - name: Clean signing keychain
        if: ${{ always() }}
        run: |
          rm -f cert.p12
          security delete-keychain build.keychain || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/MotionSmith-macos-*.dmg

      - name: Upload signed Sparkle appcast payload
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release }}
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-appcast-payload
          path: signed-appcast/**

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync

      - name: Build Linux AppImage
        run: |
          uv run python scripts/build_linux.py

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync

      - name: Build Windows executable
        run: |
          uv run python scripts/build_windows.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  create-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Validate generated production appcast payload
        env:
          OTA_SMOKE_PASSED: ${{ inputs.ota_smoke_passed }}
        run: |
          if [[ "$OTA_SMOKE_PASSED" != "true" ]]; then
            echo "::error::create_release requires ota_smoke_passed=true as manual attestation for matching staged/preflight OTA evidence."
            exit 1
          fi
          python3 scripts/validate_appcast.py sparkle-appcast-payload/appcast.xml \
            --expected-artifact MotionSmith-macos-universal2.dmg \
            --expected-version "${{ inputs.version }}" \
            --expected-url-prefix "$MOTIONSMITH_UPDATE_BASE_URL" \
            --payload-dir sparkle-appcast-payload

      - name: Preflight MotionSmith Pages publishing access
        env:
          MOTIONSMITH_PAGES_TOKEN: ${{ secrets.MOTIONSMITH_PAGES_TOKEN }}
        run: |
          if [[ -z "${MOTIONSMITH_PAGES_TOKEN:-}" ]]; then
            echo "::error::MOTIONSMITH_PAGES_TOKEN is required before creating an external release because the OTA payload must be publishable to AlanSynn/motionsmith master root."
            exit 1
          fi
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          token = os.environ["MOTIONSMITH_PAGES_TOKEN"]
          request = urllib.request.Request(
              "https://api.github.com/repos/AlanSynn/motionsmith",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  repo = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              raise SystemExit(
                  f"MOTIONSMITH_PAGES_TOKEN cannot access AlanSynn/motionsmith: HTTP {exc.code}"
              ) from exc
          permissions = repo.get("permissions") or {}
          if not (permissions.get("push") or permissions.get("admin")):
              raise SystemExit(
                  "MOTIONSMITH_PAGES_TOKEN must have push/admin permission on AlanSynn/motionsmith."
              )
          print("MotionSmith Pages token has push/admin permission.")
          PY
          trap 'git config --global --unset-all url."https://x-access-token:${MOTIONSMITH_PAGES_TOKEN}@github.com/".insteadOf || true' EXIT
          git config --global url."https://x-access-token:${MOTIONSMITH_PAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
          git ls-remote --exit-code --heads https://github.com/AlanSynn/motionsmith.git master >/dev/null

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: |
            macos-dmg/*
            linux-appimage/*
            windows-exe/*
            sparkle-appcast-payload/**
            sparkle-appcast-payload/appcast.xml
            sparkle-appcast-payload/*.delta
            sparkle-appcast-payload/*.html
            sparkle-appcast-payload/*.md
            sparkle-appcast-payload/*.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish OTA payload to MotionSmith Pages repository
        env:
          MOTIONSMITH_PAGES_TOKEN: ${{ secrets.MOTIONSMITH_PAGES_TOKEN }}
          OTA_SMOKE_PASSED: ${{ inputs.ota_smoke_passed }}
        run: |
          if [[ "$OTA_SMOKE_PASSED" != "true" ]]; then
            echo "::error::MotionSmith Pages publication requires ota_smoke_passed=true manual attestation."
            exit 1
          fi
          if [[ -z "${MOTIONSMITH_PAGES_TOKEN:-}" ]]; then
            echo "::error::MOTIONSMITH_PAGES_TOKEN is required to publish OTA payload to AlanSynn/motionsmith master root."
            exit 1
          fi
          python3 scripts/validate_appcast.py sparkle-appcast-payload/appcast.xml \
            --expected-artifact MotionSmith-macos-universal2.dmg \
            --expected-version "${{ inputs.version }}" \
            --expected-url-prefix "$MOTIONSMITH_UPDATE_BASE_URL" \
            --payload-dir sparkle-appcast-payload
          workdir=$(mktemp -d)
          trap 'rm -rf "$workdir"; git config --global --unset-all url."https://x-access-token:${MOTIONSMITH_PAGES_TOKEN}@github.com/".insteadOf || true' EXIT
          git config --global url."https://x-access-token:${MOTIONSMITH_PAGES_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --depth 1 --branch master https://github.com/AlanSynn/motionsmith.git "$workdir/motionsmith"
          rsync -av sparkle-appcast-payload/ "$workdir/motionsmith"/
          cd "$workdir/motionsmith"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          if git diff --cached --quiet; then
            echo "MotionSmith Pages payload already up to date."
          else
            git commit -m "Publish MotionSmith OTA payload ${{ inputs.version }}"
            git push origin master
          fi
